<h1>Add Intern</h1>

<form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Name"
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
    >

    <br><br>

    <input
        type="text"
        name="domain"
        placeholder="Domain"
    >

    <br><br>

    <button>
        Add Intern
    </button>

</form>
