<h1>All Interns</h1>

<table border="1">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Domain</th>
<th>Actions</th>

</tr>

{% for intern in interns %}

{% endfor %}

</table>
